{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-16 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="font-display text-3xl font-bold text-white">Welcome Back</h1>
      <p class="text-gray-400 mt-2">Continue your career journey</p>
    </div>

    <div class="bg-gray-900/80 backdrop-blur-sm border border-gray-800 rounded-3xl p-8 shadow-2xl">
      <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}" />

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
          <input type="email" name="email" value="{{ email or '' }}" required placeholder="you@example.com"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
          <div class="relative">
            <input type="password" name="password" id="password-field" required placeholder="Your password"
              class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition pr-12" />
            <button type="button" onclick="togglePass()" class="absolute right-3 top-3.5 text-gray-500 hover:text-gray-300">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 text-sm text-gray-400">
            <input type="checkbox" name="remember" class="accent-brand-500 rounded" />
            Remember me
          </label>
          <a href="#" class="text-sm text-brand-400 hover:text-brand-300">Forgot password?</a>
        </div>

        <button type="submit" class="w-full py-3.5 rounded-2xl bg-gradient-to-r from-brand-600 to-brand-500 text-white font-bold text-lg hover:from-brand-500 hover:to-brand-400 transition-all duration-300 hover:scale-[1.02] shadow-lg shadow-brand-900/40">
          Login →
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        New here? <a href="{{ url_for('auth.register') }}" class="text-brand-400 hover:text-brand-300 font-medium">Create a free account</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
function togglePass() {
  const f = document.getElementById('password-field');
  f.type = f.type === 'password' ? 'text' : 'password';
}
gsap.from('.bg-gray-900\\/80', { y: 30, opacity: 0, duration: 0.7, ease: 'power3.out', delay: 0.2 });
</script>
{% endblock %}
