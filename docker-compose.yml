version: "3.9"

services:
  # ─── Flask web app ──────────────────────────────────────────────────────────
  web:
    build:
      context: .
      target: runtime
    container_name: careerguide_web
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ml_artifacts:/app/app/ml/artifacts
      - uploads:/app/app/static/uploads
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "5000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Celery worker ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      target: runtime
    container_name: careerguide_celery
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ml_artifacts:/app/app/ml/artifacts
    networks:
      - internal

  # ─── Celery beat (scheduler) ─────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      target: runtime
    container_name: careerguide_beat
    command: celery -A app.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - web
    networks:
      - internal

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: careerguide_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: careerguide_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/static:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  redis_data:
  ml_artifacts:
  uploads:
  nginx_logs:
